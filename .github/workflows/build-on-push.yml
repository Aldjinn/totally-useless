name: build & push

on:
  push:
    branches: [ "main" ]

concurrency:
  group: build-and-push
  cancel-in-progress: true

jobs:
  build-jvm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn package -B
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            aldjinn/totally-useless:jvm
            ghcr.io/aldjinn/totally-useless:jvm
          file: ./src/main/docker/Dockerfile.jvm
          context: .
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=ghcr.io/aldjinn/totally-useless:cache-jvm
          cache-to: type=registry,ref=ghcr.io/aldjinn/totally-useless:cache-jvm,mode=max
      - name: Run the image
        run: |
          docker run -d -p 8080:8080 --name totally-useless-jvm ghcr.io/aldjinn/totally-useless:jvm
          sleep 5
      - name: Check runnability with curl
        run: |
          curl -f http://localhost:8080/headers || exit 1
      - name: Cleanup
        if: always()
        run: docker stop totally-useless-jvm && docker rm totally-useless-jvm

  build-native:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: x64
          - runner: [ubuntu-24.04-arm]
            platform: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build native with Maven inside Docker
        run: mvn package -B -Pnative -Dquarkus.native.container-build=true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            aldjinn/totally-useless:latest-${{ matrix.platform }}
            ghcr.io/aldjinn/totally-useless:latest-${{ matrix.platform }}
          file: ./src/main/docker/Dockerfile.native-micro
          context: .
          provenance: false
          cache-from: type=registry,ref=ghcr.io/aldjinn/totally-useless:cache-${{ matrix.platform }}
          cache-to: type=registry,ref=ghcr.io/aldjinn/totally-useless:cache-${{ matrix.platform }},mode=max
      - name: Run the image
        run: |
          docker run -d -p 8080:8080 --name totally-useless-${{ matrix.platform }} ghcr.io/aldjinn/totally-useless:latest-${{ matrix.platform }}
          sleep 5
      - name: Check runnability with curl
        run: |
          curl -f http://localhost:8080/headers || exit 1
      - name: Cleanup
        if: always()
        run: docker stop totally-useless-${{ matrix.platform }} && docker rm totally-useless-${{ matrix.platform }}

  link-native-to-latest:
    runs-on: ubuntu-latest
    needs: [build-native]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifest (DockerHub)
        run: |
          docker buildx imagetools create \
            -t aldjinn/totally-useless:latest \
            aldjinn/totally-useless:latest-arm64 \
            aldjinn/totally-useless:latest-x64
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest (ghcr.io)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/aldjinn/totally-useless:latest \
            ghcr.io/aldjinn/totally-useless:latest-arm64 \
            ghcr.io/aldjinn/totally-useless:latest-x64
