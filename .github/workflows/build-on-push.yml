name: build & push

on:
  push:
    branches: [ "main" ]

concurrency:
  group: build-and-push
  cancel-in-progress: true

jobs:
  build-jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn package -B
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: aldjinn/totally-useless:jvm
          file: ./src/main/docker/Dockerfile.jvm
          context: .
          platforms: linux/amd64,linux/arm64
      - name: Pull and run the image
        run: |
          docker pull aldjinn/totally-useless:jvm
          docker run -d -p 8080:8080 --name totally-useless-jvm aldjinn/totally-useless:jvm
          sleep 5
      - name: Check runnability with curl
        run: |
          curl -f http://localhost:8080/headers || exit 1
      - name: Cleanup
        if: always()
        run: docker stop totally-useless-jvm && docker rm totally-useless-jvm

  build-native-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build native with Maven inside Docker
        run: mvn package -B -Pnative -Dquarkus.native.container-build=true
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: aldjinn/totally-useless:latest-x64
          file: ./src/main/docker/Dockerfile.native-micro
          context: .
          provenance: false
      - name: Pull and run the image
        run: |
          docker pull aldjinn/totally-useless:latest-x64
          docker run -d -p 8080:8080 --name totally-useless-x64 aldjinn/totally-useless:latest-x64
          sleep 5
      - name: Check runnability with curl
        run: |
          curl -f http://localhost:8080/headers || exit 1
      - name: Cleanup
        if: always()
        run: docker stop totally-useless-x64 && docker rm totally-useless-x64

  build-native-arm64:
    runs-on: [ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build native with Maven inside Docker
        run: mvn package -B -Pnative -Dquarkus.native.container-build=true
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: aldjinn/totally-useless:latest-arm64
          file: ./src/main/docker/Dockerfile.native-micro
          context: .
          provenance: false
      - name: Pull and run the image
        run: |
          docker pull aldjinn/totally-useless:latest-arm64
          docker run -d -p 8080:8080 --name totally-useless-arm64 aldjinn/totally-useless:latest-arm64
          sleep 5
      - name: Check runnability with curl
        run: |
          curl -f http://localhost:8080/headers || exit 1
      - name: Cleanup
        if: always()
        run: docker stop totally-useless-arm64 && docker rm totally-useless-arm64

  link-native-to-latest:
    runs-on: ubuntu-latest
    needs: [build-native-x64, build-native-arm64]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create Docker manifest
        run: |
          docker manifest create aldjinn/totally-useless:latest \
            aldjinn/totally-useless:latest-arm64 \
            aldjinn/totally-useless:latest-x64
          docker manifest push aldjinn/totally-useless:latest
      - name: Pull and run the image
        run: |
          docker pull aldjinn/totally-useless:latest
          docker run -d -p 8080:8080 --name totally-useless aldjinn/totally-useless:latest
          sleep 5
      - name: Check runnability with curl
        run: |
          curl -f http://localhost:8080/headers || exit 1
      - name: Cleanup
        if: always()
        run: docker stop totally-useless && docker rm totally-useless

