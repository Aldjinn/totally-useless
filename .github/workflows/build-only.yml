name: build only

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: build-only
  cancel-in-progress: true

jobs:
  build-jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn package -B

  build-native-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build native with Maven inside Docker
        run: mvn package -B -Pnative -Dquarkus.native.container-build=true

  build-native-arm64:
    runs-on: [ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build native with Maven inside Docker
        run: mvn package -B -Pnative -Dquarkus.native.container-build=true
